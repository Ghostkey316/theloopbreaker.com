    +const { rotateJWT } = require("../utils/jwtRotation");
    +
    +program
    +  .command("partner:init")
    +  .description("Initialize partner environment with ethics pre-flight checks")
    +  .action(async () => {
    +    await validateAgainstOpenAPI("vaultfire-openapi.yaml");
    +    await rotateJWT();
    +    console.log("Partner environment validated and JWT rotated");
    +  });
    diff --git a/.github/workflows/cicd.yml b/.github/workflows/cicd.yml
    +++ b/.github/workflows/cicd.yml
    +name: Vaultfire CI/CD
    +on:
    +  push:
    +    branches: [ main ]
    +  pull_request:
    +    branches: [ main ]
    +jobs:
    +  build-test:
    +    runs-on: ubuntu-latest
    +    steps:
    +      - uses: actions/checkout@v3
    +      - uses: actions/setup-node@v3
    +        with:
    +          node-version: '18'
    +      - run: npm ci
    +      - run: npm test
    +      - uses: actions/setup-python@v4
    +        with:
    +          python-version: '3.11'
    +      - run: pip install -r requirements.txt
    +      - run: pytest
    +  deploy:
    +    needs: build-test
    +    runs-on: ubuntu-latest
    +    steps:
    +      - uses: actions/checkout@v3
