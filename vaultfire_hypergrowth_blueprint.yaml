    diff --git a/telemetry/telemetryTenantRouter.js b/telemetry/telemetryTenantRouter.js
    --- a/telemetry/telemetryTenantRouter.js
    +++ b/telemetry/telemetryTenantRouter.js
    @@
    +const CeramicClient = require("@ceramicnetwork/http-client");
    +const { create } = require("ipfs-http-client");
    +
    +const ceramic = new CeramicClient(process.env.CERAMIC_NODE);
    +const ipfs = create({ url: process.env.IPFS_GATEWAY });
    +
    +async function routeTelemetryShard(tenantId, payload) {
    +  const cid = await ipfs.add(JSON.stringify(payload));
    +  await ceramic.did.createJWS({
    +    did: tenantId,
    +    cid: cid.path,
    +    timestamp: Date.now(),
    +  });
    +  return cid.path;
    +}
    diff --git a/vaultfire-cli/vaultfire-cli.js b/vaultfire-cli/vaultfire-cli.js
    --- a/vaultfire-cli/vaultfire-cli.js
    +++ b/vaultfire-cli/vaultfire-cli.js
    @@
