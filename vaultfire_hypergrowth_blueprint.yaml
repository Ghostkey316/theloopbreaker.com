  code_diffs: |
    ```diff
    diff --git a/mvd.tf b/mvd.tf
    --- a/mvd.tf
    +++ b/mvd.tf
    @@
    +module "gcp_vaultfire" {
    +  source  = "terraform-google-modules/kubernetes-engine/google"
    +  project_id = var.project_id
    +  region     = var.region
    +  name       = "vaultfire-gke"
    +  kubernetes_version = "1.27"
    +  node_pools = [{
    +    name       = "validator-pool"
    +    node_count = 5
