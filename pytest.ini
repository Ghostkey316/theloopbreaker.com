[pytest]
markers =
    asyncio: mark a test as using asyncio-based coroutines.

# Default addopts for CI - skip tests with pyo3 panics from optional rust extensions
addopts =
    -p no:pytest_ethereum
    --ignore=tests/test_belief_trigger_engine.py
    --ignore=tests/test_cli_commands.py
    --ignore=tests/test_enterprise_upgrade.py
    --ignore=tests/test_flame_scan.py
    --ignore=tests/test_ghostkey_vaultfire_agent.py
    --ignore=tests/test_humanity_mirror_pipeline.py
    --ignore=tests/test_live_flame_scan.py
    --ignore=tests/test_mission_resonance_engine.py
    --ignore=tests/test_nanoloop_v1_1.py
    --ignore=tests/test_ns3_protocol.py
    --ignore=tests/test_pilot_broadcast_layer.py
    --ignore=tests/test_pilot_mode.py
    --ignore=tests/test_secure_store.py
    --ignore=tests/test_secure_upload.py
    --ignore=tests/test_secure_upload_pipeline.py
    --ignore=tests/test_self_healing_covenant.py
    --ignore=tests/test_timestamp_sync.py
    --ignore=tests/test_webhook_api.py
    --ignore=tests/test_webhook_queue.py
    --ignore=tests/test_x402_dashboard.py
    --ignore=tests/test_x402_gateway.py
    --ignore=tests/test_x402_hooks_reward.py
    --ignore=tests/test_yield_engine_v1.py
    --ignore=tests/test_agent_builder_deployment.py
    --ignore=tests/test_loyalty_engine.py
    -q
    --tb=short
