version: 2
pilot_ready: true
metadata:
  revision: vaultfire-pilot-prod
  lastUpdated: 2025-08-18T00:00:00Z
  releaseTrain: "vaultfire-mainnet-pilot"
services:
  reward-streams:
    ledger:
      provider: supabase
      table: vaultfire_reward_events
      url: https://supabase.example.com
      serviceRoleKey: vaultfire-service-role-v1
    scheduling:
      intervalSeconds: 120
      jitter: 0.2
      sandboxIntervalSeconds: 300
    sandboxMode:
      enabled: true
      loyaltyPreviewCap: 250
      cohortTag: codex-sandbox
      expiryMinutes: 90
      touchpointSpacingSeconds: 45
      auditLogChannel: telemetry.loyalty.sandbox
    behaviorMetrics:
      telemetryChannel: telemetry.loyalty.core
      capture:
        beliefComplexityIndex: true
        behaviorDensityScore: true
        loyaltySustainRate: true
      logComplexityStream: telemetry.behavior
      flushIntervalSeconds: 60
    intents:
      - name: loyalty-bonus
        trigger: belief.score >= 0.8
      - name: partner-milestone
        trigger: partner.firstActivation
      - name: sandbox-signal
        trigger: sandboxMode.enabled && belief.score >= 0.6
