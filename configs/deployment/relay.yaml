version: 2
pilot_ready: true
metadata:
  revision: vaultfire-pilot-prod
  lastUpdated: 2025-08-18T00:00:00Z
  releaseTrain: "vaultfire-mainnet-pilot"
services:
  webhook-relay:
    maxRetries: 5
    baseDelayMs: 500
    maxDelayMs: 15000
    jitter: 0.35
    concurrency: 8
    queues:
      production:
        target: partners
        deliveryGuarantee: at-least-once
      sandbox:
        target: sandbox
        deliveryGuarantee: at-most-once
        enabled: true
    observability:
      telemetryChannel: webhook.delivery
      behaviorMetrics:
        beliefComplexityStream: telemetry.behavior
        loyaltySandboxFeed: telemetry.loyalty.sandbox
        aggregateWindowSeconds: 120
        capture:
          - belief-complexity-index
          - belief-drift-delta
          - trust-resonance
      manifestIntegrity:
        source: ../codex_manifest.json
        requiredStatus: PASS
    safeguards:
      replayWindowMinutes: 20
      enforceEthicsManifest: true
      rejectUnsignedPayloads: true
