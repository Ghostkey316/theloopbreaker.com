version: 2
pilot_ready: true
metadata:
  revision: vaultfire-pilot-prod
  lastUpdated: 2025-08-18T00:00:00Z
telemetry:
  enabled: true
services:
  telemetry-ledger:
    persistence:
      type: postgres
      tableName: vaultfire_telemetry
      connection:
        host: telemetry-db
        port: 5432
        database: telemetry
        user: vaultfire
        password: vaultfire-telemetry-ops-bridge
      retentionDays: 35
    enrichment:
      enableBeliefComplexity: true
      fields:
        - name: beliefComplexityIndex
          source: handshake.beliefComplexity.metrics[0]
        - name: behaviorDensityScore
          source: reward-streams.behaviorMetrics.capture.behaviorDensityScore
        - name: loyaltySustainRate
          source: reward-streams.behaviorMetrics.capture.loyaltySustainRate
        - name: trustResonance
          source: handshake.beliefComplexity.metrics[2]
      logging:
        stream: telemetry.behavior
        persistedMetrics:
          - beliefComplexityIndex
          - behaviorDensityScore
          - loyaltySustainRate
          - trustResonance
    sinks:
      - type: s3
        bucket: vaultfire-telemetry-archive
        prefix: partners/
      - type: firehose
        streamName: vaultfire-telemetry-stream
      - type: realtime
        channel: telemetry.behavior
        batching:
          intervalSeconds: 10
          jitter: 0.4
          maxBatchSize: 75
    failover:
      fallbackFile: ./logs/telemetry/persistence-failover.jsonl
      beliefComplexitySnapshot: ./logs/telemetry/belief-complexity.jsonl
      maxBufferSeconds: 300
