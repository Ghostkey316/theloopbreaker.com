<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vaultfire Ghostdrift</title>
  <style>
    :root {
      color-scheme: dark;
      --background: #0a0a0f;
      --surface: #13131d;
      --accent: #7f5af0;
      --accent-soft: rgba(127, 90, 240, 0.25);
      --text: #f5f6ff;
      --muted: #8187a5;
      --verified: #2cb67d;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: radial-gradient(circle at 20% 20%, rgba(127, 90, 240, 0.15), transparent 60%),
                  radial-gradient(circle at 80% 30%, rgba(44, 182, 125, 0.12), transparent 55%),
                  var(--background);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .panel {
      background: var(--surface);
      border-radius: 18px;
      padding: 2.5rem;
      width: min(480px, 100%);
      box-shadow: 0 28px 60px rgba(7, 6, 23, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    label {
      display: block;
      margin-bottom: 0.75rem;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      color: var(--muted);
    }

    .input-group {
      position: relative;
      margin-bottom: 1.5rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.85rem 1rem;
      border-radius: 12px;
      border: 1px solid rgba(127, 90, 240, 0.4);
      background: rgba(10, 10, 15, 0.7);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .tier-display {
      font-size: 1.15rem;
      margin-bottom: 1.5rem;
      padding: 1rem;
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(127, 90, 240, 0.2), rgba(127, 90, 240, 0.05));
      border: 1px solid rgba(127, 90, 240, 0.3);
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.85rem 1.4rem;
      border-radius: 999px;
      border: none;
      background: var(--accent);
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(127, 90, 240, 0.45);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      background: rgba(44, 182, 125, 0.12);
      color: var(--verified);
      font-size: 0.9rem;
      margin-top: 1.25rem;
      border: 1px solid rgba(44, 182, 125, 0.35);
      position: relative;
      overflow: hidden;
    }

    .badge::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      box-shadow: 0 0 12px rgba(44, 182, 125, 0.55);
      opacity: 0.7;
      animation: pulse 2.4s ease-in-out infinite;
    }

    .badge span {
      position: relative;
      z-index: 1;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 0.75;
      }
      50% {
        transform: scale(1.06);
        opacity: 0.2;
      }
      100% {
        transform: scale(1);
        opacity: 0.75;
      }
    }

    .status-row {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .status-label {
      font-size: 0.85rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Ghostdrift</h1>
    <div class="input-group">
      <label for="wallet-input">ENS or Wallet</label>
      <input id="wallet-input" type="text" placeholder="ghostkey316.eth" value="ghostkey316.eth" autocomplete="off" />
    </div>
    <div class="status-row">
      <div class="status-label">Vaultfire Tier</div>
      <div id="tier-display" class="tier-display" role="status" aria-live="polite"></div>
    </div>
    <button id="believe-btn" type="button">I Believe</button>
    <div id="verified-badge" class="badge" hidden>
      <span>Vaultfire Verified</span>
    </div>
  </main>
  <script type="module" src="./ghostdrift.js"></script>
</body>
</html>
