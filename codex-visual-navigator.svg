<svg xmlns="http://www.w3.org/2000/svg" width="720" height="480" viewBox="0 0 720 480">
  <title>Codex Visual Navigator - Vaultfire Flow (Pending Audit)</title>
  <style>
    .node { fill: #0d1b2a; stroke: #4cc9f0; stroke-width: 2; }
    .node text { fill: #e0fbfc; font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 14px; }
    .link { stroke: #4cc9f0; stroke-width: 2; stroke-dasharray: 4 4; }
    .pulse { animation: pulse 4s infinite; }
    @keyframes pulse {
      0% { stroke-opacity: 0.2; }
      50% { stroke-opacity: 1; }
      100% { stroke-opacity: 0.2; }
    }
  </style>
  <rect x="0" y="0" width="720" height="480" fill="#03071e" rx="16" ry="16" />
  <a xlink:href="vaultfire/module_tiers.json">
    <rect class="node" x="60" y="60" width="180" height="80" rx="12" ry="12" />
    <text x="150" y="100" text-anchor="middle">Module Tiers</text>
    <text x="150" y="120" text-anchor="middle">Core • Optional • Advanced</text>
  </a>
  <a xlink:href="vaultfire/onboarding-template.md">
    <rect class="node" x="280" y="180" width="180" height="80" rx="12" ry="12" />
    <text x="370" y="220" text-anchor="middle">Onboarding Checklist</text>
  </a>
  <a xlink:href="vaultfire/audit-trail.md">
    <rect class="node" x="500" y="60" width="160" height="80" rx="12" ry="12" />
    <text x="580" y="100" text-anchor="middle">Audit Trail</text>
  </a>
  <a xlink:href="vaultfire/partner-protocol.md">
    <rect class="node" x="500" y="300" width="180" height="100" rx="12" ry="12" />
    <text x="590" y="340" text-anchor="middle">First Five Partner</text>
    <text x="590" y="360" text-anchor="middle">Protocol</text>
  </a>
  <a xlink:href="mission-gatekeeper.js">
    <rect class="node" x="60" y="300" width="200" height="100" rx="12" ry="12" />
    <text x="160" y="340" text-anchor="middle">Mission Gatekeeper</text>
  </a>
  <polyline class="link pulse" points="150,140 150,180 280,220" />
  <polyline class="link pulse" points="440,220 500,220 580,140" />
  <polyline class="link pulse" points="160,300 160,220 280,220" />
  <polyline class="link pulse" points="580,140 580,300" />
  <text x="360" y="430" fill="#f1faee" text-anchor="middle">Vaultfire System Flow • Click nodes to open artifacts • Pending External Audit</text>
</svg>
