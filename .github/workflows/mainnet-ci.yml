name: Mainnet Sovereign CI

on:
  push:
    branches:
      - main
      - mainnet
      - 'release/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  BASE_RPC_URL: https://mainnet.base.org
  BASE_CHAIN_ID: "8453"

jobs:
  sovereign-stack:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Node dependencies
        run: npm install

      - name: Run Jest with coverage gate
        run: npm test

      - name: Hardhat unit tests
        run: npx hardhat test
        env:
          BASE_PRIVATE_KEY: 0x59c6995e998f97a5a0044976f9d2025c207d2d0c6f1c5db29d46a26fb47e6c2a

      - name: Deploy smoke (local hardhat)
        run: npx hardhat run scripts/deploy-covenant.js
        env:
          GHOSTKEY_ECHO: 0xF891c5E6b60a9c07b7F2A2F1Ff8b7Ff9Ae0F0000

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pytest Core Innovations (RBB + Thriving Bonds)
        run: pytest tests/rbb/ tests/thriving_bonds/ -v --tb=short

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.9.2

      - name: Terraform plan (informational)
        run: |
          cd infra
          set +e
          terraform init -backend=false -input=false
          if [ $? -ne 0 ]; then
            echo "::warning ::Terraform init failed against the Base provider stub; skipping plan." # note space to avoid emoji
            exit 0
          fi
          terraform validate
          terraform plan -lock=false -input=false

      - name: Guardian echo smoke hook
        run: node tools/guardian_echo.js --dry-run
        env:
          GROK_API_URL: https://api.x.ai/v1/grok
          GROK_API_KEY: test-placeholder
