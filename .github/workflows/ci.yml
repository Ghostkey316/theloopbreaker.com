name: CI

permissions:
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Run Vaultfire setup
        run: |
          chmod +x scripts/codex_setup.sh
          ./scripts/codex_setup.sh || echo "::warning::setup script failed"
      - name: Install Python dependencies
        run: |
          timeout 300 pip install -r requirements.txt || echo "::warning::pip install requirements.txt failed"
      - name: Install Python dev dependencies
        run: |
          if [ -f requirements-dev.txt ]; then
            timeout 300 pip install -r requirements-dev.txt || echo "::warning::pip install requirements-dev.txt failed"
          fi
      - name: Install Node dependencies
        run: npm install
      - name: Run Pytest
        run: |
          if [ -f secure_upload/secure.key ]; then
            PYTHONWARNINGS=ignore pytest -q
          else
            echo "::warning::Secure files missing, skipping pytest"
          fi
      - name: Run Node tests
        run: npm test
