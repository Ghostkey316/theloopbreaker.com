<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vaultfire Marketplace</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
    header { background: #222; color: white; padding: 20px; text-align: center; }
    header h1 { margin: 0; font-size: 1.8em; }
    header button { margin-left: 20px; }
    .hero { background:#f5f5f5; text-align:center; padding:40px 20px; }
    section { padding:20px; }
    .seller { display:flex; align-items:center; margin-bottom:10px; }
    .avatar { width:40px; height:40px; border-radius:50%; background:#888; color:white; display:flex; align-items:center; justify-content:center; margin-right:10px; }
    ul { list-style:none; padding:0; }
    .theme-dark { background:#111; color:#eee; }
    .theme-dark header { background:#000; }
    .theme-dark .hero { background:#222; }
  </style>
</head>
<body>
  <header>
    <h1>Vaultfire Marketplace</h1>
    <button id="themeToggle">Toggle Theme</button>
  </header>

  <section class="hero">
    <h2>Build Ethically, Sell Freely</h2>
    <p>All listings verified by the Ghostkey-316 ethics layer.</p>
  </section>

  <section id="featuredSellers">
    <h3>Featured Ethical Sellers</h3>
    <div class="sellerList"></div>
  </section>

  <section id="filterPanel">
    <h3>Filter Listings</h3>
    <label>Ethics Rank:
      <select id="filterRank">
        <option value="">All</option>
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="C">C</option>
      </select>
    </label>
    <label>Signal ≥
      <input type="number" id="filterSignal" style="width:60px;">
    </label>
    <label>Category:
      <select id="filterCategory"></select>
    </label>
  </section>

  <section id="listings">
    <h3>Live Listings</h3>
    <ul id="listingFeed"></ul>
  </section>

  <section id="contribStats">
    <h3>Your Contribution Stats</h3>
    <pre id="stats"></pre>
  </section>

  <section id="aiHelper">
    <h3>AI Helper</h3>
    <div id="aiHelperContainer"></div>
  </section>
  <script src="../ai_helper.js"></script>
  <script src="marketplace.js"></script>
  <script>
    const currentUser = {
      signal_score: 0,
      manifesto_alignment: []
    };

    const aiHelper = new ChatAssistant({
      mode: "Vaultfire",
      prompt: "What would you like to find or list today?",
      context: {
        userSignalScore: currentUser.signal_score,
        values: currentUser.manifesto_alignment
      }
    });

    aiHelper.init(document.getElementById('aiHelperContainer'));
  </script>
</body>
</html>
