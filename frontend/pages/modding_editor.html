<!DOCTYPE html>
<html lang="en">
<head>

  <title>Vaultfire Modding Editor</title>
  <style>
    body { font-family: Arial, sans-serif; padding:20px; }
    textarea { width:100%; height:100px; }
  </style>
</head>
<body>

</body>
</html>
