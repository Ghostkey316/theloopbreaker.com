<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Submit Case Study</title>
</head>
<body>
  <h1>Case Study Submission</h1>
  <form id="caseForm">
    <label>Pseudonym (optional):<br>
      <input type="text" name="pseudonym" />
    </label><br>
    <label>Condition:<br>
      <input type="text" name="condition" required />
    </label><br>
    <label>Treatment:<br>
      <input type="text" name="treatment" required />
    </label><br>
    <label>Notes:<br>
      <textarea name="notes"></textarea>
    </label><br>
    <button type="submit">Submit</button>
  </form>
  <script src="case_study_form.js"></script>
</body>
</html>
